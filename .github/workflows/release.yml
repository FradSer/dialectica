name: Release

# Publish to PyPI + create a GitHub Release whenever a vX.Y.Z tag is pushed.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.11"
      - run: uv sync
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pytest   # mocked suite; the live e2e test auto-skips without a key

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publishing (no secret needed)
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(grep -m1 '^version = ' pyproject.toml | sed -E 's/^version = "(.*)"/\1/')"
          echo "tag=$TAG  pyproject=$VER"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Tag v$TAG does not match pyproject version $VER — bump pyproject first."
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
